<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VRM BlendShape Editor</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- 編集用サイドバー -->
      <aside id="sidebar">
        <header>
          <h1>VRM BlendShape Editor</h1>
          <!-- Multi-VRM Target Selector -->
          <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button id="target-vrm0" class="btn primary" style="flex:1;">Target: VRM 1</button>
            <button id="target-vrm1" class="btn" style="flex:1; opacity: 0.6;">Target: VRM 2</button>
          </div>

          <div class="file-action">
            <label for="vrm-upload" class="btn primary" style="flex:1;">Load VRM</label>
            <input type="file" id="vrm-upload" accept=".vrm" style="display:none;" />
          </div>

          <div class="file-action" style="margin-top: 10px;">
            <div style="display: flex; gap: 10px;">
              <select id="preset-anim-select" class="btn" style="flex: 2;">
                <option value="">-- Preset Anim --</option>
              </select>
              <button id="delete-anim-btn" class="btn" style="flex: 0; padding: 0 10px; display: none;" title="Delete Saved Anim">🗑</button>
              <label for="bvh-upload" class="btn">Load BVH</label>
              <input type="file" id="bvh-upload" accept=".bvh" style="display:none;" />
              <label for="fbx-upload" class="btn">Load FBX</label>
              <input type="file" id="fbx-upload" accept=".fbx" style="display:none;" />
            </div>
            <div class="checkbox-group">
              <div class="checkbox-wrapper">
                <input type="checkbox" id="anim-inplace" checked>
                <label for="anim-inplace">In-place</label>
              </div>
              <div class="checkbox-wrapper">
                <input type="checkbox" id="auto-blink" checked>
                <label for="auto-blink">Auto Blink</label>
              </div>
              <div class="checkbox-wrapper">
                <input type="checkbox" id="auto-talk">
                <label for="auto-talk">Auto Talk</label>
              </div>
              <div class="checkbox-wrapper">
                <input type="checkbox" id="look-at-camera">
                <label for="look-at-camera">Look At Camera</label>
              </div>
              <div class="checkbox-wrapper">
                <input type="checkbox" id="auto-breathe">
                <label for="auto-breathe">Breathing</label>
              </div>
            </div>
            <div class="preview-slider" style="margin-top: 8px;">
              <label>Breathing Intensity <span id="breathe-intensity-val">50</span>%</label>
              <input type="range" id="breathe-intensity" min="0" max="100" value="50" />
            </div>
          </div>
          
          <div class="file-action" style="margin-top: 10px;">
            <label for="stage-upload" class="btn">Load Stage</label>
            <input type="file" id="stage-upload" accept=".fbx,.glb,.gltf" style="display:none;" />
          </div>

          <!-- 3D Transform Controls -->
          <div id="transform-ui" style="margin-top: 10px; padding: 10px; background: #252526; border-radius: 4px;">
            <div style="font-size: 0.85rem; margin-bottom: 5px; color: var(--primary-hover);">3D Object Editor</div>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
              <button id="gizmo-translate" class="btn btn-sm active" style="flex:1; border: 1px solid var(--primary-color);">Move</button>
              <button id="gizmo-rotate" class="btn btn-sm" style="flex:1;">Rotate</button>
              <button id="gizmo-scale" class="btn btn-sm" style="flex:1;">Scale</button>
            </div>
            <div style="display: flex; gap: 10px;">
              <button id="attach-vrm" class="btn primary btn-sm" style="flex:1;">Attach VRM</button>
              <button id="attach-stage" class="btn btn-sm" style="flex:1;">Attach Stage</button>
              <button id="detach-gizmo" class="btn btn-sm" style="flex:0; padding:0 10px;" title="Detach Selection">X</button>
            </div>
          </div>
          
          <!-- Lighting & Effects -->
          <div id="lighting-effects-ui" style="margin-top: 10px; padding: 10px; background: #252526; border-radius: 4px; display: flex; flex-direction: column; gap: 8px;">
            <div style="font-size: 0.85rem; color: var(--primary-hover); font-weight: bold;">Lighting & Effects</div>
            
            <div style="display: flex; gap: 10px; font-size: 0.8rem;">
              <label><input type="checkbox" id="shadow-toggle"> Enable Shadows</label>
              <label><input type="checkbox" id="post-effects-toggle"> Enable Post-Effects</label>
            </div>

            <div style="font-size: 0.8rem; margin-top: 4px; color: #ccc;">Lights</div>
            <div style="display: flex; align-items: center; gap: 5px;">
              <input type="color" id="dir-light-color" value="#ffffff" title="Directional Light Color" style="width:24px; height:24px; padding:0; border:none; cursor:pointer;" />
              <div class="preview-slider" style="flex: 1; margin: 0;">
                <label style="font-size: 0.75rem;">Directional <span id="dir-light-val">1.0</span></label>
                <input type="range" id="dir-light-intensity" min="0" max="500" value="100" />
              </div>
            </div>
            <div style="display: flex; align-items: center; gap: 5px;">
              <input type="color" id="amb-light-color" value="#ffffff" title="Ambient Light Color" style="width:24px; height:24px; padding:0; border:none; cursor:pointer;" />
              <div class="preview-slider" style="flex: 1; margin: 0;">
                <label style="font-size: 0.75rem;">Ambient <span id="amb-light-val">0.5</span></label>
                <input type="range" id="amb-light-intensity" min="0" max="500" value="50" />
              </div>
            </div>

            <div id="post-effects-panel" style="display:none; flex-direction: column; gap: 5px; border-top: 1px solid #444; padding-top: 5px; margin-top: 5px;">
              <div style="font-size: 0.8rem; color: #ccc;">Post Effects (Bloom & DoF)</div>
              <div class="preview-slider" style="margin: 0;">
                <label style="font-size: 0.75rem;">Bloom Intensity <span id="bloom-val">0.5</span></label>
                <input type="range" id="bloom-intensity" min="0" max="300" value="50" />
              </div>
              <div class="preview-slider" style="margin: 0;">
                <label style="font-size: 0.75rem;">Focus Distance <span id="dof-focus-val">2.0</span></label>
                <input type="range" id="dof-focus" min="1" max="1000" value="200" />
              </div>
              <div class="preview-slider" style="margin: 0;">
                <label style="font-size: 0.75rem;">Aperture (Blur) <span id="dof-aperture-val">0.02</span></label>
                <input type="range" id="dof-aperture" min="0" max="100" value="20" />
              </div>
            </div>
          </div>
        </header>

        <div id="editor-container" class="hidden">
          <div class="tabs" id="preset-tabs">
            <!-- プリセットのタブが動的に生成される -->
          </div>

          <div class="preset-header">
            <h2 id="current-preset-name">VRM Expressions</h2>
          </div>

          <div id="mesh-targets" class="mesh-targets-container">
            <!-- 選択されたプリセットに対する全モーフターゲットのリストとスライダーが生成される -->
          </div>
        </div>

        <div id="loading" class="hidden">処理中...</div>
      </aside>

      <!-- 3Dビューア -->
      <main id="viewer">
        <canvas id="main-canvas"></canvas>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
