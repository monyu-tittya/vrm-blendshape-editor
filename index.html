<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VRM BlendShape Editor</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- 編集用サイドバー -->
      <aside id="sidebar">
        <header>
          <h1>VRM BlendShape Editor</h1>
          <div class="file-action">
            <label for="vrm-upload" class="btn primary">Load VRM</label>
            <input type="file" id="vrm-upload" accept=".vrm" style="display:none;" />
            <div style="display: flex; gap: 10px;">
              <select id="preset-anim-select" class="btn">
                <option value="">-- Preset Anim --</option>
              </select>
              <label for="bvh-upload" class="btn">Load BVH</label>
              <input type="file" id="bvh-upload" accept=".bvh" style="display:none;" />
              <label for="fbx-upload" class="btn">Load FBX</label>
              <input type="file" id="fbx-upload" accept=".fbx" style="display:none;" />
            </div>
            <div class="checkbox-group">
              <div class="checkbox-wrapper">
                <input type="checkbox" id="anim-inplace" checked>
                <label for="anim-inplace">In-place</label>
              </div>
              <div class="checkbox-wrapper">
                <input type="checkbox" id="auto-blink" checked>
                <label for="auto-blink">Auto Blink</label>
              </div>
              <div class="checkbox-wrapper">
                <input type="checkbox" id="auto-talk">
                <label for="auto-talk">Auto Talk</label>
              </div>
              <div class="checkbox-wrapper">
                <input type="checkbox" id="look-at-camera">
                <label for="look-at-camera">Look At Camera</label>
              </div>
            </div>
          </div>
          <div class="file-action" style="margin-top: 10px;">
            <label for="stage-upload" class="btn">Load Stage</label>
            <input type="file" id="stage-upload" accept=".fbx,.glb,.gltf" style="display:none;" />
            <button id="vrm-download" class="btn primary" disabled>Export VRM</button>
          </div>
          <div id="stage-controls" class="hidden" style="margin-top: 10px; padding: 10px; background: #252526; border-radius: 4px;">
            <div style="font-size: 0.85rem; margin-bottom: 5px; color: var(--primary-hover);">Stage Options</div>
            <div class="preview-slider">
              <label>Scale <span id="stage-scale-val">100</span>%</label>
              <input type="range" id="stage-scale" min="1" max="500" value="100" />
            </div>
            <div class="preview-slider" style="margin-top: 5px;">
              <label>Height (Y) <span id="stage-y-val">0.00</span>m</label>
              <input type="range" id="stage-y" min="-500" max="500" value="0" />
            </div>
          </div>
        </header>

        <div id="editor-container" class="hidden">
          <div class="tabs" id="preset-tabs">
            <!-- プリセットのタブが動的に生成される -->
          </div>

          <div class="preset-header">
            <h2 id="current-preset-name">Preset: Joy</h2>
            <div class="preview-slider">
              <label>Preview Amount <span id="preview-val">100</span>%</label>
              <input type="range" id="preview-amount" min="0" max="100" value="100" />
            </div>
          </div>

          <div id="mesh-targets" class="mesh-targets-container">
            <!-- 選択されたプリセットに対する全モーフターゲットのリストとスライダーが生成される -->
          </div>
        </div>

        <div id="loading" class="hidden">処理中...</div>
      </aside>

      <!-- 3Dビューア -->
      <main id="viewer">
        <canvas id="main-canvas"></canvas>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
